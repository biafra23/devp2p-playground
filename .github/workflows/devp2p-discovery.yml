name: devp2p Discovery Test

on:
  workflow_dispatch:   # run manually from the Actions tab
  push:
    branches: ["main", "main-gt6j7"]
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC

jobs:
  discover:
    name: Peer Discovery (UDP allowed)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build
        run: ./gradlew build -x test --no-daemon

      - name: Run devp2p discovery (5 min timeout)
        id: discovery
        run: |
          # Capture output; allow the app to exit with non-zero (timeout case) without failing
          ./gradlew :app:run --no-daemon 2>&1 | tee discovery.log || true

      - name: Report result
        run: |
          echo "--- Summary ---"
          if grep -q "BLOCK HEADERS RECEIVED" discovery.log; then
            echo "SUCCESS: block headers were received from the Ethereum network!"
            grep -A 10 "BLOCK HEADERS RECEIVED" discovery.log
          else
            echo "TIMEOUT or no headers received within 300 s."
            echo "Peer table / connection stats:"
            grep -E "(Table has|attempted|discv4|Attempting)" discovery.log | tail -30 || true
            # Don't fail the job – UDP may still be restricted on this runner
          fi

      - name: Upload discovery log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-log
          path: discovery.log
          retention-days: 7
